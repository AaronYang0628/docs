apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-agent
  labels:
    app: ops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ops-agent
  template:
    metadata:
      labels:
        app: ops-agent
    spec:
      serviceAccountName: ops-agent-sa
      volumes:
        - name: opencode-config
          configMap:
            name: ops-agent-config

      containers:
        # ---- main: opencode web ----
        - name: opencode
          image: crpi-wixjy6gci86ms14e.cn-hongkong.personal.cr.aliyuncs.com/ay-dev/ops-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: opencode
          env:
            - name: OPS_MODEL_SECRET
              valueFrom:
                secretKeyRef:
                  name: opencode-secrets
                  key: deepseek-api-key
            - name: GIT_SSH_KEY
              valueFrom:
                secretKeyRef:
                  name: opencode-git-ssh
                  key: ssh-privatekey
            - name: GIT_USER_NAME
              value: "Aaron Yang"
            - name: GIT_USER_EMAIL
              value: "aaron19940628@gmail.com"
            - name: OPENCODE_WORKSPACE
              value: /app/repo-baked
            - name: OPENCODE_CONFIG_TEMPLATE
              value: /app/repo-baked/.opencode/opencode.json
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: ops-agent-langfuse
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ops-agent-langfuse
                  key: LANGFUSE_SECRET_KEY
            - name: LANGFUSE_BASEURL
              value: https://langfuse.72602.online
          command:
            - /bin/sh
            - -c
            - |
              # Setup AI provider with correct provider name
              if [ -n "${OPS_MODEL_SECRET:-}" ]; then
                  mkdir -p "$HOME/.local/share/opencode"
                  cat > "$HOME/.local/share/opencode/auth.json" <<AUTH
              {
                "openai": {
                  "type": "api",
                  "key": "${OPS_MODEL_SECRET}"
                }
              }
              AUTH
              fi
              # Setup git SSH key
              if [ -n "${GIT_SSH_KEY:-}" ]; then
                  mkdir -p "$HOME/.ssh"
                  printf '%s\n' "$GIT_SSH_KEY" > "$HOME/.ssh/id_ed25519"
                  chmod 600 "$HOME/.ssh/id_ed25519"
                  ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
              fi
              if [ -n "${GIT_USER_NAME:-}" ]; then
                  git config --global user.name "${GIT_USER_NAME}"
              fi
              if [ -n "${GIT_USER_EMAIL:-}" ]; then
                  git config --global user.email "${GIT_USER_EMAIL}"
              fi
              WORKSPACE="${OPENCODE_WORKSPACE:-/app/repo-baked}"
              cd "$WORKSPACE"
              git pull --rebase 2>/dev/null || true
              echo "Starting opencode from $(pwd) ..."
              exec opencode web --hostname 0.0.0.0 --port 3000 --print-logs --log-level INFO
          volumeMounts:
            - name: opencode-config
              mountPath: /app/repo-baked/.opencode/opencode.json
              subPath: opencode.json

        # ---- sidecar: oauth2-proxy (GitHub OAuth 2FA) ----
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          ports:
            - containerPort: 4180
              name: auth-proxy
          args:
            - --provider=github
            - --github-user=AaronYang0628
            - --upstream=http://127.0.0.1:3000
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://ops.agent.72602.online/oauth2/callback
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-name=_opencode_auth
          env:
            - name: HTTP_PROXY
              value: http://100.107.240.120:7890
            - name: HTTPS_PROXY
              value: http://100.107.240.120:7890
            - name: NO_PROXY
              value: localhost,127.0.0.1,.svc,.cluster.local,10.42.0.0/16,10.43.0.0/16,100.64.0.0/10,ghfast.top
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: opencode-oauth2-secrets
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: opencode-oauth2-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: opencode-oauth2-secrets
                  key: cookie-secret
