apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-agent
  labels:
    app: ops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ops-agent
  template:
    metadata:
      labels:
        app: ops-agent
    spec:
      serviceAccountName: ops-agent-sa
      volumes:
        - name: opencode-config
          configMap:
            name: ops-agent-config

      containers:
        # ---- main: opencode web ----
        - name: opencode
          image: crpi-wixjy6gci86ms14e.cn-hongkong.personal.cr.aliyuncs.com/ay-dev/ops-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: opencode
          env:
            - name: OPS_MODEL_SECRET
              valueFrom:
                secretKeyRef:
                  name: opencode-secrets
                  key: deepseek-api-key
            - name: GIT_SSH_KEY
              valueFrom:
                secretKeyRef:
                  name: opencode-git-ssh
                  key: ssh-privatekey
            - name: GIT_USER_NAME
              value: "Aaron Yang"
            - name: GIT_USER_EMAIL
              value: "aaron19940628@gmail.com"
            - name: OPENCODE_WORKSPACE
              value: /app/repo-baked
            - name: OPENCODE_CONFIG_TEMPLATE
              value: /app/repo-baked/.opencode/opencode.json
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: ops-agent-langfuse
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ops-agent-langfuse
                  key: LANGFUSE_SECRET_KEY
            - name: LANGFUSE_BASEURL
              value: https://langfuse.72602.online
          volumeMounts:
            - name: opencode-config
              mountPath: /app/repo-baked/.opencode/opencode.json
              subPath: opencode.json

        # ---- sidecar: oauth2-proxy (GitHub OAuth 2FA) ----
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          ports:
            - containerPort: 4180
              name: auth-proxy
          args:
            - --provider=github
            - --github-user=AaronYang0628
            - --upstream=http://127.0.0.1:3000
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://ops.agent.72602.online/oauth2/callback
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-name=_opencode_auth
          env:
            - name: HTTP_PROXY
              value: http://100.107.240.120:7890
            - name: HTTPS_PROXY
              value: http://100.107.240.120:7890
            - name: NO_PROXY
              value: localhost,127.0.0.1,.svc,.cluster.local,10.42.0.0/16,10.43.0.0/16,100.64.0.0/10,ghfast.top
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: opencode-oauth2-secrets
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: opencode-oauth2-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: opencode-oauth2-secrets
                  key: cookie-secret
