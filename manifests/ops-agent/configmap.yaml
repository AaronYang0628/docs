apiVersion: v1
kind: ConfigMap
metadata:
  name: ops-agent-config
data:
  # ────────────────────────────────────────────
  # opencode.json — workspace-level config
  # Provider structure + models defined here.
  # API key is injected via auth.json (entrypoint).
  # No apiKey in options to avoid workspace config
  # overriding the user-level credential injection.
  # ────────────────────────────────────────────
  opencode.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "provider": {
        "openai": {
          "options": {
            "baseURL": "https://sub2api.72602.online/v1"
          },
          "models": {
            "deepseek-v4-flash": {
              "name": "Deepseek V4 Flash",
              "limit": { "context": 400000, "output": 128000 },
              "variants": { "low": {}, "medium": {}, "high": {} }
            },
            "deepseek-v4-pro": {
              "name": "Deepseek V4 Pro",
              "limit": { "context": 1050000, "output": 128000 },
              "variants": { "low": {}, "medium": {}, "high": {}, "xhigh": {} }
            }
          }
        }
      },
      "model": "openai/deepseek-v4-flash",
      "small_model": "openai/deepseek-v4-flash",
      "agent": {
        "72602-k3s-maintainer": { "options": { "store": false } },
        "hugo-doc-maintainer": { "options": { "store": false } }
      },
      "plugin": ["opencode-plugin-langfuse"],
      "experimental": {
        "openTelemetry": true
      }
    }
