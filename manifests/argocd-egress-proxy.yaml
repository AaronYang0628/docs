apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-egress-proxy
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-egress-proxy
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-egress-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-egress-proxy
        app.kubernetes.io/part-of: argocd
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: socat
          image: alpine/socat:1.8.0.3
          args:
            - -d
            - -d
            - TCP-LISTEN:17890,fork,reuseaddr,bind=0.0.0.0
            - TCP:127.0.0.1:7890
          ports:
            - name: http-proxy
              containerPort: 17890
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http-proxy
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http-proxy
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-egress-proxy
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-egress-proxy
    app.kubernetes.io/part-of: argocd
spec:
  selector:
    app.kubernetes.io/name: argocd-egress-proxy
  ports:
    - name: http-proxy
      port: 17890
      targetPort: http-proxy
      protocol: TCP
