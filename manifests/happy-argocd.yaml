apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: happy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AaronYang0628/docs.git
    targetRevision: main
    path: manifests/happy
  destination:
    server: https://kubernetes.default.svc
    namespace: happy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
