apiVersion: v1
kind: Namespace
metadata:
  name: application
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filing-site
  namespace: application
  labels:
    app.kubernetes.io/name: filing-site
data:
  nginx.conf: |
    worker_processes 1;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 128; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 30;
      server_tokens off;
      access_log off;
      gzip on;
      gzip_types text/css application/javascript image/svg+xml;
      server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        location = /healthz {
          add_header Content-Type text/plain;
          return 200 'ok';
        }
        location / {
          try_files $uri $uri/ /index.html;
        }
      }
    }
  index.html: |
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <meta name="description" content="72602云端 — 门牌 72602 的家庭照片小站" />
      <title>72602云端</title>
      <style>
        :root {
          --ink: #1c1917;
          --soft: #57534e;
          --muted: #78716c;
          --paper: #faf7f2;
          --card: rgba(255, 252, 247, 0.78);
          --line: rgba(28, 25, 23, 0.08);
          --teal: #0f766e;
          --clay: #c2410c;
          --sand: #d6d3d1;
          --shadow: 0 30px 80px rgba(28, 25, 23, 0.10);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { min-height: 100%; }
        body {
          font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
          color: var(--ink);
          background:
            radial-gradient(900px 520px at 8% 0%, rgba(15, 118, 110, 0.14), transparent 60%),
            radial-gradient(800px 480px at 100% 10%, rgba(194, 65, 12, 0.10), transparent 55%),
            radial-gradient(700px 420px at 50% 100%, rgba(214, 211, 209, 0.55), transparent 60%),
            linear-gradient(180deg, #f7f3ec 0%, #f3efe8 45%, #efeae2 100%);
        }
        .grain {
          pointer-events: none;
          position: fixed;
          inset: 0;
          opacity: 0.04;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
          z-index: 0;
        }
        .page {
          position: relative;
          z-index: 1;
          width: min(980px, calc(100% - 32px));
          margin: 0 auto;
          padding: 36px 0 64px;
        }
        header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          margin-bottom: 28px;
        }
        .logo {
          display: flex;
          align-items: center;
          gap: 12px;
          font-weight: 650;
          letter-spacing: 0.01em;
        }
        .plate {
          min-width: 54px;
          height: 36px;
          padding: 0 10px;
          border-radius: 8px;
          border: 1.5px solid rgba(28,25,23,0.18);
          background: linear-gradient(180deg, #fffdf9, #f3efe8);
          box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 18px rgba(28,25,23,0.06);
          display: grid;
          place-items: center;
          font-variant-numeric: tabular-nums;
          font-size: 14px;
          letter-spacing: 0.12em;
          font-weight: 700;
        }
        .quiet {
          color: var(--muted);
          font-size: 13px;
        }
        .hero {
          position: relative;
          overflow: hidden;
          border-radius: 32px;
          background: var(--card);
          border: 1px solid rgba(255,255,255,0.7);
          box-shadow: var(--shadow);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          padding: clamp(28px, 5vw, 52px);
          margin-bottom: 18px;
        }
        .hero::before {
          content: "";
          position: absolute;
          width: 280px;
          height: 280px;
          right: -60px;
          top: -80px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(15,118,110,0.16), transparent 70%);
        }
        .eyebrow {
          position: relative;
          display: inline-flex;
          align-items: center;
          gap: 10px;
          color: var(--teal);
          font-size: 13px;
          font-weight: 600;
          margin-bottom: 16px;
        }
        .eyebrow::before {
          content: "";
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--teal);
          box-shadow: 0 0 0 5px rgba(15,118,110,0.12);
        }
        h1 {
          position: relative;
          font-size: clamp(2.1rem, 5vw, 3.35rem);
          line-height: 1.12;
          letter-spacing: -0.03em;
          max-width: 14ch;
          margin-bottom: 18px;
          font-weight: 720;
        }
        .lead {
          position: relative;
          max-width: 46ch;
          color: var(--soft);
          font-size: clamp(1.02rem, 2.1vw, 1.15rem);
          line-height: 1.85;
          margin-bottom: 10px;
        }
        .lead-en {
          position: relative;
          max-width: 52ch;
          color: var(--muted);
          font-size: 0.95rem;
          line-height: 1.7;
          margin-bottom: 28px;
        }
        .family {
          position: relative;
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 12px;
        }
        .person {
          border-radius: 22px;
          padding: 18px 16px 16px;
          background: rgba(255,255,255,0.62);
          border: 1px solid var(--line);
          min-height: 148px;
        }
        .person .who {
          font-size: 12px;
          font-weight: 650;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: 10px;
        }
        .person h2 {
          font-size: 1.25rem;
          margin-bottom: 8px;
          letter-spacing: -0.02em;
        }
        .person p {
          color: var(--soft);
          font-size: 0.92rem;
          line-height: 1.65;
        }
        .person.aaron { background: linear-gradient(180deg, rgba(15,118,110,0.08), rgba(255,255,255,0.55)); }
        .person.licorice { background: linear-gradient(180deg, rgba(194,65,12,0.08), rgba(255,255,255,0.55)); }
        .person.yakult { background: linear-gradient(180deg, rgba(234,179,8,0.12), rgba(255,255,255,0.55)); }
        .story {
          display: grid;
          grid-template-columns: 1.35fr 1fr;
          gap: 18px;
        }
        .block {
          border-radius: 28px;
          padding: clamp(22px, 3.5vw, 32px);
          background: rgba(255,252,247,0.72);
          border: 1px solid rgba(255,255,255,0.65);
          box-shadow: 0 18px 50px rgba(28,25,23,0.06);
        }
        .block h3 {
          font-size: 1.05rem;
          margin-bottom: 12px;
          letter-spacing: -0.01em;
        }
        .block p {
          color: var(--soft);
          line-height: 1.8;
          font-size: 0.98rem;
        }
        .block + .block h3 { color: var(--teal); }
        .notes {
          display: grid;
          gap: 12px;
          margin-top: 14px;
        }
        .note {
          display: grid;
          grid-template-columns: 18px 1fr;
          gap: 10px;
          align-items: start;
          color: var(--soft);
          font-size: 0.94rem;
          line-height: 1.65;
        }
        .note i {
          width: 8px;
          height: 8px;
          margin-top: 8px;
          border-radius: 50%;
          background: var(--clay);
          opacity: 0.75;
        }
        footer {
          margin-top: 22px;
          padding: 0 6px;
          display: flex;
          flex-wrap: wrap;
          justify-content: space-between;
          gap: 10px 18px;
          color: var(--muted);
          font-size: 13px;
        }
        footer a {
          color: inherit;
          text-decoration: none;
        }
        footer a:hover { color: var(--ink); }
        @media (max-width: 820px) {
          .family, .story { grid-template-columns: 1fr; }
          h1 { max-width: none; }
          header { align-items: flex-start; flex-direction: column; }
        }
      </style>
    </head>
    <body>
      <div class="grain" aria-hidden="true"></div>
      <div class="page">
        <header>
          <div class="logo">
            <div class="plate" title="门牌号">72602</div>
            <div>云端</div>
          </div>
          <div class="quiet">a small home on the internet</div>
        </header>

        <section class="hero">
          <div class="eyebrow">来自门牌 72602</div>
          <h1>把家里的光，收进云里。</h1>
          <p class="lead">
            72602 是我们家的门牌号。这个小站不卖东西，也不热闹——
            只想给家里的照片、片段和随手记下的日子，留一个安静的位置。
          </p>
          <p class="lead-en">
            Named after our door number. A quiet place for home photos, little notes,
            and the days we want to keep.
          </p>

          <div class="family">
            <article class="person aaron">
              <div class="who">Me</div>
              <h2>Aaron</h2>
              <p>家里的程序员兼兼职摄影师。负责按快门，也负责把文件塞进「云端」别弄丢。</p>
            </article>
            <article class="person licorice">
              <div class="who">My love</div>
              <h2>Licorice</h2>
              <p>我的妻子。镜头前最好看的人，也是相册里出现频率最高的名字。</p>
            </article>
            <article class="person yakult">
              <div class="who">Coming soon</div>
              <h2>Yakult · 养乐多</h2>
              <p>十月将与我们见面的小男孩。相册已经预留好他的第一页。</p>
            </article>
          </div>
        </section>

        <section class="story">
          <div class="block">
            <h3>这里放什么</h3>
            <p>
              门前的树影、晚饭后的客厅、旅行里拍糊的一张、以及以后养乐多的小手小脚。
              72602 云端更像家里的抽屉：不是秀场，只是把值得留下的影像和说明，轻轻叠好。
            </p>
            <div class="notes">
              <div class="note"><i></i><span>家庭照片与影像目录</span></div>
              <div class="note"><i></i><span>拍摄日期、地点和一句随手备注</span></div>
              <div class="note"><i></i><span>只给我们自己慢慢回看</span></div>
            </div>
          </div>
          <div class="block">
            <h3>Why 72602</h3>
            <p>
              Every home has a number on the door. Ours is 72602.
              This site keeps our photo file information in one calm place —
              for Aaron, Licorice, and Yakult, who will join us this October.
            </p>
          </div>
        </section>

        <footer>
          <div>© 72602云端 · door no. 72602</div>
          <div>72602.space</div>
        </footer>
      </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filing-site
  namespace: application
  labels:
    app.kubernetes.io/name: filing-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: filing-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: filing-site
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
            - name: conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/cache/nginx
            - name: log
              mountPath: /var/log/nginx
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: html
          configMap:
            name: filing-site
            items:
              - key: index.html
                path: index.html
        - name: conf
          configMap:
            name: filing-site
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: log
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: filing-site
  namespace: application
  labels:
    app.kubernetes.io/name: filing-site
spec:
  selector:
    app.kubernetes.io/name: filing-site
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filing-site
  namespace: application
  labels:
    app.kubernetes.io/name: filing-site
  annotations:
    cert-manager.io/cluster-issuer: lets-encrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 72602.space
      secretName: 72602.space-tls
  rules:
    - host: 72602.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filing-site
                port:
                  number: 80
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filing-site
                port:
                  number: 80
