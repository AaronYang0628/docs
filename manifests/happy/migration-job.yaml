apiVersion: batch/v1
kind: Job
metadata:
  name: happy-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: happy-migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: aliyun-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: migrate
          image: crpi-wixjy6gci86ms14e.cn-hongkong.personal.cr.aliyuncs.com/ay-dev/happy-server:3f161de
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - pnpm --filter happy-server-self-host exec prisma migrate deploy
          env:
            - name: COREPACK_HOME
              value: /tmp/corepack
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: happy-server
                  key: database-url
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
