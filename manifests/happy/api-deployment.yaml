apiVersion: apps/v1
kind: Deployment
metadata:
  name: happy-api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: happy-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: happy-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: happy-api
    spec:
      imagePullSecrets:
        - name: aliyun-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: api
          image: crpi-wixjy6gci86ms14e.cn-hongkong.personal.cr.aliyuncs.com/ay-dev/happy-server:3f161de
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3005"
            - name: DATA_DIR
              value: /data
            - name: PUBLIC_URL
              value: https://happy-api.72602.online
            - name: METRICS_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: happy-server
                  key: database-url
            - name: HANDY_MASTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: happy-server
                  key: master-secret
          ports:
            - name: http
              containerPort: 3005
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: files
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: happy-files
        - name: tmp
          emptyDir: {}
