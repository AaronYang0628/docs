global:
  librechat:
    existingSecretName: librechat-credentials-env
    existingSecretApiKey: OPENAI_API_KEY

librechat:
  existingSecretName: librechat-credentials-env
  configEnv:
    ALLOW_REGISTRATION: "false"
    ENDPOINTS: "openAI"
  configYamlContent: |
    version: 1.2.8
    cache: true
    endpoints:
      custom:
        - name: "sub2api"
          apiKey: "${OPENAI_API_KEY}"
          baseURL: "https://sub2api.home.geekcity.tech:32443/v1"
          models:
            default: ["gpt-image-2"]
            fetch: true
          titleConvo: false
          summarize: false
          modelDisplayLabel: "sub2api"

image:
  registry: ghcr.io
  repository: danny-avila/librechat

service:
  type: ClusterIP
  port: 3080
  targetPort: 3080
  containerPort: 3080

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: lets-encrypt
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  hosts:
    - host: txt2img.agent.72602.online
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: txt2img-agent-tls
      hosts:
        - txt2img.agent.72602.online

enableServiceLinks: false

mongodb:
  enabled: true
  auth:
    enabled: false
  databases:
    - LibreChat

meilisearch:
  enabled: true
  auth:
    existingMasterKeySecret: librechat-credentials-env

redis:
  enabled: false
