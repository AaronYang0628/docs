apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-agent-dashboard
  namespace: monitor
  labels:
    grafana_dashboard: "1"
data:
  agent-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "type": "stat",
          "title": "CPU Usage %",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          }
        },
        {
          "type": "stat",
          "title": "Memory Usage %",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            }
          }
        },
        {
          "type": "stat",
          "title": "OTLP Spans Received (Alloy UI note)",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"alloy.*\"}[5m]))",
              "refId": "A",
              "legendFormat": "alloy cpu"
            }
          ]
        },
        {
          "type": "stat",
          "title": "ops-agent Ready",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_ready{namespace=\"application\",deployment=\"ops-agent\"}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Node CPU / Memory",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "cpu%",
              "refId": "A"
            },
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "mem%",
              "refId": "B"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod CPU (top)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "topk(8, sum by (namespace,pod) (rate(container_cpu_usage_seconds_total{container!=\"\",container!=\"POD\"}[5m])))",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "ops-agent Memory Working Set",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"application\",pod=~\"ops-agent.*\",container=\"ops-agent\"})",
              "legendFormat": "ops-agent",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        },
        {
          "type": "traces",
          "title": "Recent Agent Traces (Tempo)",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "tempo", "uid": "tempo" },
          "targets": [
            {
              "queryType": "traceqlSearch",
              "filters": [
                {
                  "id": "service-name",
                  "tag": "service.name",
                  "operator": "=",
                  "value": ["ops-agent"],
                  "scope": "resource"
                }
              ],
              "limit": 20,
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["agent", "72602", "ops-agent"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "browser",
      "title": "72602 Agent Overview",
      "uid": "agent-overview-72602",
      "version": 1
    }
