apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgadmin
spec:
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
  project: default
  source:
    repoURL: https://helm.runix.net
    chart: pgadmin4
    targetRevision: 1.62.0
    helm:
      releaseName: pgadmin
      values: |
        image:
          registry: docker.io
          repository: dpage/pgadmin4
        replicaCount: 1
        persistentVolume:
          enabled: false
        env:
          email: pgadmin@mail.dev.72602.online
          passwordExistingSecret: pgadmin-credentials
        extraEnv:
          - name: PGADMIN_CONFIG_WTF_CSRF_ENABLED
            value: "False"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            cert-manager.io/cluster-issuer: lets-encrypt
          hosts:
            - host: pgadmin.dev.72602.online
              paths:
                - path: /
                  pathType: ImplementationSpecific
          tls:
            - secretName: pgadmin.dev.72602.online-tls
              hosts:
                - pgadmin.dev.72602.online
  destination:
    server: https://kubernetes.default.svc
    namespace: database
