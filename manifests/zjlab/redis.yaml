apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
spec:
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 18.16.0
    helm:
      releaseName: redis
      values: |
        image:
          registry: docker.io
          repository: bitnami/redis
        architecture: replication
        auth:
          enabled: true
          existingSecret: redis-credentials
          existingSecretPasswordKey: redis-password
        sentinel:
          enabled: false
        master:
          count: 1
          persistence:
            enabled: true
            storageClass: local-path
            size: 8Gi
        replica:
          replicaCount: 1
          persistence:
            enabled: true
            storageClass: local-path
            size: 8Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: database
