apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n-online-compat
  namespace: n8n
  annotations:
    cert-manager.io/cluster-issuer: lets-encrypt
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "50"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - n8n.72602.online
        - webhook.n8n.72602.online
      secretName: n8n.72602.online-tls
  rules:
    - host: n8n.72602.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678
    - host: webhook.n8n.72602.online
      http:
        paths:
          - path: /webhook/
            pathType: Prefix
            backend:
              service:
                name: n8n-webhook
                port:
                  number: 5678
          - path: /webhook-test/
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678
          - path: /form/
            pathType: Prefix
            backend:
              service:
                name: n8n-webhook
                port:
                  number: 5678
          - path: /form-test/
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678
          - path: /mcp/
            pathType: Prefix
            backend:
              service:
                name: n8n-mcp-webhook
                port:
                  number: 5678
          - path: /mcp-test/
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678
          - path: /rest/oauth2-credential/callback
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678
          - path: /static/
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678
          - path: /webhook-waiting/
            pathType: Prefix
            backend:
              service:
                name: n8n-webhook
                port:
                  number: 5678
          - path: /form-waiting/
            pathType: Prefix
            backend:
              service:
                name: n8n-webhook
                port:
                  number: 5678
