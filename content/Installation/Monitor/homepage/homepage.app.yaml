apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
spec:
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  source:
    repoURL: https://github.com/AaronYang0628/docs.git
    targetRevision: main
    path: manifests/homepage
  destination:
    server: https://kubernetes.default.svc
    namespace: application
