apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opencode-web
spec:
  project: default
  source:
    repoURL: https://github.com/AaronYang0628/docs.git
    targetRevision: main
    path: manifests/opencode
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  destination:
    server: https://kubernetes.default.svc
    namespace: application
